name: YouTube Live M3U8 Generator
run-name: Generating live M3U8 playlist 🎬

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ffmpeg
          pip install --upgrade yt-dlp
          echo "yt-dlp version: $(yt-dlp --version)"

      - name: Check streams.txt
        run: |
          if [ ! -f "streams.txt" ]; then
            echo "Creating default streams.txt"
            echo "# YouTube Live Streams" > streams.txt
            echo "https://www.youtube.com/@AriseNewsChannel" >> streams.txt
            echo "https://www.youtube.com/@channelstv" >> streams.txt
            echo "https://www.youtube.com/@NewsCentralTV" >> streams.txt
          fi
          cat streams.txt

      - name: Generate M3U8
        id: generate
        run: |
          echo "Generating playlist..."
          
          # Create header
          echo "#EXTM3U" > streams.m3u8
          echo "#EXT-X-VERSION:3" >> streams.m3u8
          echo "# Generated: $(date -u)" >> streams.m3u8
          echo "" >> streams.m3u8
          
          ACTIVE=0
          TOTAL=0
          
          while read line; do
            # Skip comments
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "$line" ]] && continue
            
            TOTAL=$((TOTAL + 1))
            echo ""
            echo "Checking $TOTAL: $line"
            
            # Simple check - just try to get title
            TITLE=$(yt-dlp --socket-timeout 10 --get-title "$line" 2>/dev/null || echo "Failed")
            
            if [ "$TITLE" != "Failed" ]; then
              echo "  ✅ Got title: $TITLE"
              ACTIVE=$((ACTIVE + 1))
              echo "" >> streams.m3u8
              echo "#EXTINF:-1,$TITLE" >> streams.m3u8
              echo "$line" >> streams.m3u8
            else
              echo "  ❌ Failed to fetch"
            fi
          done < streams.txt
          
          # Add footer
          echo "" >> streams.m3u8
          echo "# Active: $ACTIVE/$TOTAL" >> streams.m3u8
          
          echo "active=$ACTIVE" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          
          echo ""
          echo "Summary: $ACTIVE/$TOTAL active"

      - name: Show playlist
        run: |
          echo ""
          echo "Generated playlist:"
          echo "=================="
          head -20 streams.m3u8

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add streams.m3u8
          
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          
          git commit -m "Update M3U8 playlist"
          git push
          echo "Pushed updates"
