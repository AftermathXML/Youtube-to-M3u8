name: YouTube Live M3U8 Generator
run-name: Generate playlist with WARP 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Prevent infinite runs
    
    # Add resource optimization
    strategy:
      fail-fast: false  # Don't cancel other jobs if one fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Setup Cloudflare WARP with enhanced error handling
        id: warp
        continue-on-error: true  # Don't fail if WARP fails
        run: |
          echo "🌐 Setting up Cloudflare WARP..."
          
          # Install wireguard-tools
          sudo apt-get update
          sudo apt-get install -y wireguard-tools iptables
          
          # Install wgcf
          curl -fsSL https://github.com/ViRb3/wgcf/releases/download/v2.2.22/wgcf_2.2.22_linux_amd64 -o wgcf
          chmod +x wgcf
          sudo mv wgcf /usr/local/bin/
          
          WARP_SUCCESS=false
          
          # Retry loop with better error checking
          for i in {1..2}; do  # Reduced from 3 to 2 attempts
            echo "🔄 Attempt $i to setup WARP..."
            
            # Clean previous attempts
            rm -f wgcf-account.toml wgcf-profile.conf 2>/dev/null || true
            
            # Register with timeout
            echo "  📝 Registering account..."
            if ! timeout 20 wgcf register --accept-tos; then  # Reduced timeout
              echo "  ⚠️ Registration timed out"
              continue
            fi
            
            if [ ! -f "wgcf-account.toml" ]; then
              echo "  ⚠️ Account file not created"
              continue
            fi
            echo "  ✅ Account registered"
            
            # Generate profile with timeout
            echo "  🔧 Generating profile..."
            if ! timeout 20 wgcf generate; then
              echo "  ⚠️ Profile generation timed out"
              continue
            fi
            
            if [ ! -f "wgcf-profile.conf" ]; then
              echo "  ⚠️ Profile file not created"
              continue
            fi
            echo "  ✅ Profile generated"
            
            # Fix config for GitHub Actions
            sed -i 's/AllowedIPs = 0.0.0.0\/0,::\/0/AllowedIPs = 0.0.0.0\/0/' wgcf-profile.conf
            sed -i '/Address = fd/d' wgcf-profile.conf
            sed -i '/DNS = /d' wgcf-profile.conf
            
            # Start WireGuard with timeout
            sudo mkdir -p /etc/wireguard
            sudo cp wgcf-profile.conf /etc/wireguard/wgcf.conf
            
            echo "  🚀 Starting WireGuard..."
            if timeout 30 sudo wg-quick up /etc/wireguard/wgcf.conf; then
              echo "  ✅ WireGuard started successfully"
            else
              echo "  ⚠️ wg-quick failed, trying manual setup..."
              sudo ip link add dev wgcf type wireguard
              sudo ip address add dev wgcf $(grep 'Address = ' wgcf-profile.conf | cut -d= -f2 | tr -d ' ')
              sudo wg setconf wgcf /etc/wireguard/wgcf.conf
              sudo ip link set up dev wgcf
            fi
            
            # Wait for connection
            sleep 3
            
            # Verify connection
            WARP_CHECK=$(curl -s --max-time 5 https://cloudflare.com/cdn-cgi/trace)
            echo "  🔍 WARP status:"
            echo "$WARP_CHECK" | grep -E "ip|warp"
            
            if echo "$WARP_CHECK" | grep -q "warp=on"; then
              echo "✅ WARP connected successfully on attempt $i"
              echo "🌐 Current IP: $(curl -s --max-time 5 https://ipinfo.io/ip)"
              WARP_SUCCESS=true
              echo "warp=success" >> $GITHUB_OUTPUT
              break
            fi
            
            echo "⚠️ Attempt $i failed, cleaning up..."
            sudo wg-quick down /etc/wireguard/wgcf.conf 2>/dev/null || true
            sudo ip link del dev wgcf 2>/dev/null || true
            
            if [ $i -lt 2 ]; then
              echo "⏱️ Waiting 30 seconds before retry..."
              sleep 30
            fi
          done
          
          if [ "$WARP_SUCCESS" = false ]; then
            echo "⚠️ WARP failed, continuing without it"
            echo "warp=failed" >> $GITHUB_OUTPUT
          fi

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate playlist with optimized Python script
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          import os
          import sys
          from datetime import datetime, timezone

          def get_stream_url(url, cookies_file, attempt_num):
              """Simplified function with better error handling"""
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 20,
                  'extract_flat': True,  # Less resource intensive
              }
              
              try:
                  with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                      info = ydl.extract_info(url, download=False)
                      
                      if not info:
                          return None, None
                      
                      # Get video ID
                      video_id = info.get('id')
                      if not video_id:
                          return None, None
                      
                      print(f"  ✅ Got video ID: {video_id}")
                      
                      # Check if live
                      is_live = info.get('is_live', False)
                      if not is_live:
                          return None, info.get('title', 'Unknown')
                      
                      # Get best format
                      formats = info.get('formats', [])
                      for fmt in formats:
                          protocol = fmt.get('protocol', '')
                          if protocol in ['m3u8', 'm3u8_native'] and fmt.get('url'):
                              return fmt['url'], info.get('title', 'Unknown')
                      
                      return None, info.get('title', 'Unknown')
                      
              except Exception as e:
                  print(f"  ⚠️ Error: {str(e)[:100]}")
                  return None, None

          # Main execution
          if not os.path.exists('streams.txt'):
              print("❌ streams.txt not found")
              sys.exit(0)  # Don't fail the workflow

          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          if not lines:
              print("⚠️ No streams found")
              sys.exit(0)

          m3u8 = [
              "#EXTM3U",
              f"# Generated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}",
              f"# Total channels: {len(lines)}",
              ""
          ]

          total = active = 0

          for line in lines:
              url_match = re.search(r'https?://\S+', line)
              if not url_match:
                  continue
              
              url = url_match.group()
              total += 1
              
              name_match = re.search(r'@([^/]+)', url)
              name = name_match.group(1) if name_match else f"Channel {total}"
              
              print(f"\n📺 [{total}/{len(lines)}] Processing: {name}")
              
              # Single attempt with short delay
              time.sleep(random.randint(5, 10))
              stream_url, title = get_stream_url(url, 'cookies.txt', total)
              
              if stream_url:
                  active += 1
                  print(f"  ✅ SUCCESS: Got direct stream")
                  m3u8.extend([
                      f"#EXTINF:-1 tvg-name=\"{name}\" group-title=\"YouTube Live\",{name} (Live)",
                      stream_url,
                      ""
                  ])
              else:
                  print(f"  ⚠️ Using fallback URL")
                  m3u8.extend([
                      f"#EXTINF:-1 tvg-name=\"{name}\" group-title=\"YouTube Live\",{name} (YouTube)",
                      url,
                      ""
                  ])
              
              # Minimal cooldown between channels
              if total < len(lines):
                  cooldown = random.randint(30, 60)
                  print(f"  ⏱️ Cooldown: {cooldown}s")
                  time.sleep(cooldown)

          m3u8.extend([
              f"",
              f"# Summary: {active}/{total} streams active",
              f"# Updated: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')}"
          ])

          with open('streams.m3u8', 'w') as f:
              f.write('\n'.join(m3u8))

          print(f"\n{'='*40}")
          print(f"📊 FINAL: {active}/{total} streams active")
          print(f"{'='*40}")

          PYTHON_EOF

          python generate.py

      - name: Show playlist preview
        run: |
          echo ""
          echo "📄 Generated streams.m3u8:"
          echo "=========================="
          head -20 streams.m3u8
          echo "..."

      - name: Cleanup & Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Cleanup sensitive files
          rm -f cookies.txt generate.py wgcf-profile.conf wgcf-account.toml
          
          # Stop WireGuard if running
          sudo wg-quick down /etc/wireguard/wgcf.conf 2>/dev/null || true
          sudo ip link del dev wgcf 2>/dev/null || true
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add streams.m3u8
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          ACTIVE_COUNT=$(grep -c 'Live' streams.m3u8 || echo "0")
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)] - ${ACTIVE_COUNT} active"
          git pull --rebase origin main || true
          git push origin main
          echo "✅ Playlist updated"
