name: YouTube Live M3U8 Generator
run-name: Generate playlist with cookies 🎬

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours (safer for rate limits)
  push:
    paths:
      - 'streams.txt'
      - '.github/workflows/main.yml'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python & yt-dlp
        run: |
          pip install --upgrade pip yt-dlp
          echo "✅ yt-dlp: $(yt-dlp --version)"

      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.COOKIES_TXT }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "❌ COOKIES_TXT secret is required"
            exit 1
          fi
          echo "$COOKIES" > cookies.txt
          echo "✅ Cookies loaded ($(wc -l < cookies.txt) lines)"

      - name: Generate playlist
        run: |
          cat > generate.py << 'PYTHON_EOF'
          import yt_dlp
          import time
          import random
          import re
          from datetime import datetime, timezone

          def get_stream_url(url, cookies_file):
              ydl_opts = {
                  'cookies': cookies_file,
                  'quiet': True,
                  'no_warnings': True,
                  'socket_timeout': 30,
                  'extract_flat': False,
              }
              
              for attempt in range(5):
                  delay = min(20 * (2 ** attempt) + random.randint(0, 10), 300)
                  print(f"  ⏱️ Attempt {attempt + 1}/5 - waiting {delay}s...")
                  time.sleep(delay)
                  
                  try:
                      with yt_dlp.YoutubeDL({**ydl_opts, 'get_id': True}) as ydl:
                          info = ydl.extract_info(url, download=False)
                          if not info:
                              continue
                          
                          video_id = info.get('id')
                          if not video_id:
                              continue
                          
                          print(f"  ✅ Got video ID: {video_id}")
                          time.sleep(5)
                          
                          # Get direct URL
                          with yt_dlp.YoutubeDL({**ydl_opts, 'format': 'best[height<=1080]/best'}) as ydl2:
                              info2 = ydl2.extract_info(f"https://youtube.com/watch?v={video_id}", download=False)
                              if info2 and 'url' in info2:
                                  return info2['url'], info2.get('title', 'Unknown')
                              
                  except Exception as e:
                      print(f"  ❌ Error: {str(e)[:100]}")
                      if 'rate' in str(e).lower() or '429' in str(e):
                          print("  ⚠️ Rate limited - increasing delay")
              
              return None, None

          # Main
          with open('streams.txt', 'r') as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          m3u8 = ["#EXTM3U", f"# Generated: {datetime.now(timezone.utc).isoformat()}", ""]

          total = active = 0

          for line in lines:
              url_match = re.search(r'https?://\S+', line)
              if not url_match:
                  continue
              
              url = url_match.group()
              total += 1
              
              # Extract name from @handle or use default
              name_match = re.search(r'@([^/]+)', url)
              name = name_match.group(1) if name_match else f"Channel {total}"
              
              print(f"\n📺 [{total}] Processing: {name}")
              
              stream_url, title = get_stream_url(url, 'cookies.txt')
              
              if stream_url:
                  active += 1
                  print(f"  ✅ Direct stream acquired!")
                  m3u8.extend([
                      f"#EXTINF:-1 tvg-name=\"{name}\" group-title=\"YouTube Live\",{name} (Live)",
                      stream_url,
                      ""
                  ])
              else:
                  print(f"  ⚠️ Using fallback URL")
                  m3u8.extend([
                      f"#EXTINF:-1 tvg-name=\"{name}\" group-title=\"YouTube Live\",{name} (YouTube)",
                      url,
                      ""
                  ])
              
              # Cooldown between channels (skip last)
              if total < len(lines):
                  cooldown = random.randint(180, 300)
                  print(f"  ⏱️ Cooldown: {cooldown}s")
                  time.sleep(cooldown)

          m3u8.extend([
              f"# Summary: {active}/{total} direct streams",
              f"# Updated: {datetime.now(timezone.utc).isoformat()}"
          ])

          with open('streams.m3u8', 'w') as f:
              f.write('\n'.join(m3u8))

          print(f"\n📊 SUMMARY: {active}/{total} direct streams")
          PYTHON_EOF

          python generate.py

      - name: Cleanup & Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f cookies.txt generate.py
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add streams.m3u8
          
          if git diff --cached --quiet; then
            echo "ℹ️ No changes"
            exit 0
          fi
          
          git commit -m "🔄 Update playlist [$(date -u +%H:%M)] - $(grep -c '^http' streams.m3u8) streams"
          git pull --rebase origin main
          git push origin main
