      - name: Generate M3U8 playlist
        id: generate
        run: |
          echo "🎬 Generating YouTube Live M3U8 Playlist..."
          echo "📋 yt-dlp version: $(yt-dlp --version)"
          echo "📋 ffmpeg version: $(ffmpeg -version | head -n1)"
          
          if [ ! -f "streams.txt" ]; then
            echo "❌ streams.txt not found!"
            exit 1
          fi
          
          # Create playlist file
          echo "#EXTM3U" > streams.m3u8
          echo "#EXT-X-VERSION:3" >> streams.m3u8
          echo "# Generated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> streams.m3u8
          echo "" >> streams.m3u8
          
          ACTIVE_STREAMS=0
          TOTAL_STREAMS=0
          
          while IFS= read -r line || [ -n "$line" ]; do
            [[ "$line" =~ ^#.*$ ]] && continue
            [[ -z "${line// }" ]] && continue
            
            url=$(echo "$line" | grep -o 'https\?://[^ ]*' | head -1)
            
            if [ -n "$url" ]; then
              TOTAL_STREAMS=$((TOTAL_STREAMS + 1))
              echo ""
              echo "🔍 [$TOTAL_STREAMS] Checking: $url"
              
              # Create error log file
              ERROR_LOG=$(mktemp)
              
              # Try to get video info with verbose output and geo-bypass
              if info=$(yt-dlp --verbose --socket-timeout 30 --geo-bypass -J "$url" 2>"$ERROR_LOG"); then
                echo "  ✅ Successfully fetched info."
                # ... (rest of your successful processing logic) ...
                # (Keep your existing code for processing successful fetches here)
                
              else
                echo "  ❌ yt-dlp failed."
                echo "  🔍 First 15 lines of error log:"
                head -15 "$ERROR_LOG" | sed 's/^/    /'
                
                # Try a fallback: just get the channel's live video URL
                echo "  🔄 Attempting fallback: Get current live video URL..."
                live_url=$(yt-dlp --socket-timeout 15 --geo-bypass --get-url -f "best" "$url" 2>/dev/null | head -1)
                if [ -n "$live_url" ]; then
                  echo "  ✅ Fallback successful! Got live URL."
                  ACTIVE_STREAMS=$((ACTIVE_STREAMS + 1))
                  channel_name=$(echo "$url" | grep -o '@[^/]*' | tr -d '@' || echo "Channel")
                  echo "" >> streams.m3u8
                  echo "#EXTINF:-1 tvg-id=\"${channel_name}.yt\" group-title=\"News\",${channel_name} (Live - Fallback)" >> streams.m3u8
                  echo "$live_url" >> streams.m3u8
                else
                  echo "  ❌ Fallback also failed."
                  channel_name=$(echo "$url" | grep -o '@[^/]*' | tr -d '@' || echo "Unknown")
                  echo "" >> streams.m3u8
                  echo "#EXTINF:-1 tvg-id=\"${channel_name}.yt\" group-title=\"News\",${channel_name} (Error - check logs)" >> streams.m3u8
                  echo "# Failed URL: $url" >> streams.m3u8
                fi
              fi
              rm -f "$ERROR_LOG"
            fi
          done < streams.txt
          
          # Add summary
          echo "" >> streams.m3u8
          echo "# Total streams: $TOTAL_STREAMS" >> streams.m3u8
          echo "# Active live streams: $ACTIVE_STREAMS" >> streams.m3u8
          echo "# Last updated: $(date -u '+%Y-%m-%d %H:%M UTC')" >> streams.m3u8
          
          echo "active=$ACTIVE_STREAMS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL_STREAMS" >> $GITHUB_OUTPUT
